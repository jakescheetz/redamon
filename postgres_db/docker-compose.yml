services:
  postgres:
    image: postgres:16-alpine
    container_name: parallax-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-parallax}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-parallax_secret}
      POSTGRES_DB: ${POSTGRES_DB:-parallax}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-parallax} -d ${POSTGRES_DB:-parallax}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
